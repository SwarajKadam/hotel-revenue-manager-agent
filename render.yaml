services:
  - type: web
    name: hotel-revenue-manager-backend
    env: python
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATA_SITE_URL
        value: https://otel-hackathon-data-site.vercel.app
      - key: OPENAI_API_KEY
        sync: false