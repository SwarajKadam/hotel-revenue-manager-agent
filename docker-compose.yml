services:
  postgres:
    image: postgres:16
    container_name: hotel_hackathon_postgres
    environment:
      POSTGRES_DB: hotel_hackathon
      POSTGRES_USER: hackathon
      POSTGRES_PASSWORD: hackathon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  postgres_data: